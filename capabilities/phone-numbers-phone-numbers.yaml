naftiko: 1.0.0-alpha2
info:
  label: Bandwidth Phone Numbers API — Phone Numbers
  description: 'Bandwidth Phone Numbers API — Phone Numbers. 2 operations. Lead operation: List phone numbers. Self-contained
    Naftiko capability covering one Bandwidth business surface.'
  tags:
  - Bandwidth
  - Phone Numbers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BANDWIDTH_API_KEY: BANDWIDTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: phone-numbers-phone-numbers
    baseUri: https://dashboard.bandwidth.com/api
    description: Bandwidth Phone Numbers API — Phone Numbers business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-tns
      path: /accounts/{accountId}/tns
      operations:
      - name: listphonenumbers
        method: GET
        description: List phone numbers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: size
          in: query
          type: integer
          description: Number of results per page
        - name: city
          in: query
          type: string
          description: Filter by city
        - name: state
          in: query
          type: string
          description: Filter by state abbreviation
        - name: lata
          in: query
          type: string
          description: Filter by LATA code
    - name: accounts-accountId-tns-phoneNumber
      path: /accounts/{accountId}/tns/{phoneNumber}
      operations:
      - name: getphonenumber
        method: GET
        description: Get phone number details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: phoneNumber
          in: path
          type: string
          description: The phone number to look up (digits only)
          required: true
    authentication:
      type: basic
      username: '{{env.BANDWIDTH_USER}}'
      password: '{{env.BANDWIDTH_PASS}}'
  exposes:
  - type: rest
    namespace: phone-numbers-phone-numbers-rest
    port: 8080
    description: REST adapter for Bandwidth Phone Numbers API — Phone Numbers. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/tns
      name: accounts-accountid-tns
      description: REST surface for accounts-accountId-tns.
      operations:
      - method: GET
        name: listphonenumbers
        description: List phone numbers
        call: phone-numbers-phone-numbers.listphonenumbers
        with:
          page: rest.page
          size: rest.size
          city: rest.city
          state: rest.state
          lata: rest.lata
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}/tns/{phonenumber}
      name: accounts-accountid-tns-phonenumber
      description: REST surface for accounts-accountId-tns-phoneNumber.
      operations:
      - method: GET
        name: getphonenumber
        description: Get phone number details
        call: phone-numbers-phone-numbers.getphonenumber
        with:
          phoneNumber: rest.phoneNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: phone-numbers-phone-numbers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bandwidth Phone Numbers API — Phone Numbers. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-phone-numbers
      description: List phone numbers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: phone-numbers-phone-numbers.listphonenumbers
      with:
        page: tools.page
        size: tools.size
        city: tools.city
        state: tools.state
        lata: tools.lata
      outputParameters:
      - type: object
        mapping: $.
    - name: get-phone-number-details
      description: Get phone number details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: phone-numbers-phone-numbers.getphonenumber
      with:
        phoneNumber: tools.phoneNumber
      outputParameters:
      - type: object
        mapping: $.
