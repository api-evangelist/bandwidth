naftiko: "1.0.0-alpha1"

info:
  namespace: bandwidth-mfa
  label: "Bandwidth Multi-Factor Authentication API"
  baseUrl: https://mfa.bandwidth.com/api/v1

authentication:
  - type: basic
    description: Bandwidth API credentials (accountId + apiToken)

operations:
  - operationId: createMessagingMfa
    method: POST
    path: /accounts/{accountId}/code/messaging
    description: "Send MFA code via SMS"
  - operationId: createVoiceMfa
    method: POST
    path: /accounts/{accountId}/code/voice
    description: "Send MFA code via voice call"
  - operationId: verifyMfaCode
    method: POST
    path: /accounts/{accountId}/code/verify
    description: "Verify MFA code"
