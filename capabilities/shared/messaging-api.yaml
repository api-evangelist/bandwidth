naftiko: "1.0.0-alpha1"

info:
  namespace: bandwidth-messaging
  label: "Bandwidth Messaging API"
  baseUrl: https://messaging.bandwidth.com/api/v2

authentication:
  - type: basic
    description: Bandwidth API credentials (accountId + apiToken)

operations:
  - operationId: createMessage
    method: POST
    path: /users/{accountId}/messages
    description: "Send a message"
  - operationId: listMessages
    method: GET
    path: /users/{accountId}/messages
    description: "List messages"
  - operationId: listMedia
    method: GET
    path: /users/{accountId}/media
    description: "List media files"
  - operationId: uploadMedia
    method: PUT
    path: /users/{accountId}/media/{mediaName}
    description: "Upload a media file"
    pathParameters: [mediaName]
  - operationId: getMedia
    method: GET
    path: /users/{accountId}/media/{mediaName}
    description: "Download a media file"
    pathParameters: [mediaName]
  - operationId: deleteMedia
    method: DELETE
    path: /users/{accountId}/media/{mediaName}
    description: "Delete a media file"
    pathParameters: [mediaName]
