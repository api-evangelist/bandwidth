      call: phone-numbers-sites.getsite
      outputParameters:
      - type: object
        mapping: $.
    - name: update-site
      description: Update a site
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: phone-numbers-sites.updatesite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-site
      description: Delete a site
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: phone-numbers-sites.deletesite
      outputParameters:
      - type: object
        mapping: $.
